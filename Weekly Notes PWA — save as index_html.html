<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Weekly Notes" />
<title>Weekly Notes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #888;
    --faint: #bbb;
    --input-bg: #f0f0eb;
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --card: #252525;
      --border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --muted: #888;
      --faint: #555;
      --input-bg: #333;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 8px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .week-nav button {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .week-label { text-align: center; }
  .week-label .title { font-size: 15px; font-weight: 600; }
  .week-label .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 8px 16px 32px;
  }
  @media (min-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .card-icon { font-size: 18px; }
  .card-title { font-size: 15px; font-weight: 600; flex: 1; }
  .card-count { font-size: 12px; opacity: 0.7; }
  .items { padding: 6px 0; min-height: 40px; }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .item:last-child { border-bottom: none; }
  .item input[type=checkbox] {
    margin-top: 2px;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .item-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .item-text.done {
    text-decoration: line-through;
    color: var(--muted);
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--faint);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .empty { padding: 10px 14px; font-size: 13px; color: var(--faint); font-style: italic; }
  .add-row {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-top: 0.5px solid var(--border);
  }
  .add-row input {
    flex: 1;
    font-size: 14px;
    padding: 7px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }
  .add-row button {
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    cursor: pointer;
    background: var(--accent);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <div class="week-nav" style="display:flex;gap:8px;">
    <button onclick="changeWeek(-1)" aria-label="Previous week">‹</button>
  </div>
  <div class="week-label">
    <div class="title" id="week-title"></div>
    <div class="sub" id="week-sub"></div>
  </div>
  <div class="week-nav" style="display:flex;gap:8px;">
    <button onclick="changeWeek(1)" aria-label="Next week">›</button>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>
const TOPICS = [
  { key: "relationship", label: "Relationship", icon: "❤️", accent: "#D4537E" },
  { key: "work",         label: "Work",         icon: "💼", accent: "#185FA5" },
  { key: "play",         label: "Play",         icon: "🏆", accent: "#3B6D11" },
  { key: "finance",      label: "Finance",      icon: "💰", accent: "#854F0B" },
  { key: "health",       label: "Health",       icon: "🫀", accent: "#0F6E56" },
];

let weekOffset = 0;

function getMondayKey(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((day + 6) % 7) + offset * 7);
  return mon.toISOString().slice(0, 10);
}

function getWeekLabel(key) {
  const s = new Date(key + "T00:00:00");
  const e = new Date(s);
  e.setDate(s.getDate() + 6);
  const fmt = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return `${fmt(s)} – ${fmt(e)}`;
}

function loadAll() {
  try { return JSON.parse(localStorage.getItem("wn_v1") || "{}"); } catch { return {}; }
}

function saveAll(data) {
  localStorage.setItem("wn_v1", JSON.stringify(data));
}

function getItems(topic) {
  const all = loadAll();
  const wk = getMondayKey(weekOffset);
  return all[wk]?.[topic] || [];
}

function setItems(topic, items) {
  const all = loadAll();
  const wk = getMondayKey(weekOffset);
  if (!all[wk]) all[wk] = {};
  all[wk][topic] = items;
  saveAll(all);
}

function render() {
  const wk = getMondayKey(weekOffset);
  document.getElementById("week-title").textContent = getWeekLabel(wk);
  document.getElementById("week-sub").textContent = weekOffset === 0 ? "This week" : weekOffset < 0 ? `${Math.abs(weekOffset)}w ago` : `${weekOffset}w ahead`;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  TOPICS.forEach(({ key, label, icon, accent }) => {
    const items = getItems(key);
    const done = items.filter(i => i.done).length;

    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--accent", accent);

    const hdr = `
      <div class="card-header" style="background:${accent}18;">
        <span class="card-icon">${icon}</span>
        <span class="card-title" style="color:${accent}">${label}</span>
        ${items.length ? `<span class="card-count" style="color:${accent}">${done}/${items.length}</span>` : ""}
      </div>`;

    const itemsHtml = items.length
      ? items.map((item, idx) => `
        <div class="item">
          <input type="checkbox" ${item.done ? "checked" : ""} onchange="toggle('${key}',${idx})" style="accent-color:${accent}" />
          <span class="item-text ${item.done ? "done" : ""}">${escHtml(item.text)}</span>
          <button class="del-btn" onclick="del('${key}',${idx})" aria-label="Delete">×</button>
        </div>`).join("")
      : `<div class="empty">No items yet</div>`;

    const addRow = `
      <div class="add-row">
        <input type="text" id="inp-${key}" placeholder="Add item…" onkeydown="if(event.key==='Enter')add('${key}')" />
        <button onclick="add('${key}')" style="background:${accent}">Add</button>
      </div>`;

    card.innerHTML = hdr + `<div class="items">${itemsHtml}</div>` + addRow;
    grid.appendChild(card);
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function add(topic) {
  const inp = document.getElementById("inp-" + topic);
  const text = inp.value.trim();
  if (!text) return;
  const items = getItems(topic);
  items.push({ id: Date.now(), text, done: false });
  setItems(topic, items);
  inp.value = "";
  render();
}

function toggle(topic, idx) {
  const items = getItems(topic);
  items[idx].done = !items[idx].done;
  setItems(topic, items);
  render();
}

function del(topic, idx) {
  const items = getItems(topic);
  items.splice(idx, 1);
  setItems(topic, items);
  render();
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

render();
</script>
</body>
</html>
